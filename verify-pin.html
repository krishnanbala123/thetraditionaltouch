  <body class="authentication-wrap">
    <!-- verify pin start    -->
    <div class="auth-main">
      <div class="codex-authbox">
        <div class="auth-header">
          <div class="auth-icon">              <i class="fa fa-envelope-open"></i></div>
          <h3>verify your email</h3>
          <p>Plase Enter The Verification Code We Sent <br> To formeto@example.Com</p>
        </div>
        <form onsubmit="onSubmit(event)" action="#">
          <div class="form-group">
            <div class="group-small auth-pin">
              <input class="form-control code-input" type="text" required="">
              <input class="form-control code-input" type="text" required="">
              <input class="form-control code-input" type="text" required="">
              <input class="form-control code-input" type="text" required="">
              <input class="form-control code-input" type="text" required="">
              <input class="form-control code-input" type="text" required="">
            </div>
          </div>
          <div class="form-group">                  
            <button class="btn btn-primary mt-0" type="submit">Confirm</button>
          </div>
        </form>
        <div class="auth-footer text-center">
          <p>Dont Receive The Email ? <a class="text-primary" href="#"> Resend Email</a></p>
        </div>
      </div>
    </div>
    <!-- verify pin end-->
      <!-- main jquery-->
      <script src="./assets/js/jquery-3.6.0.min.js"></script>
      <!-- feather js-->
      <script src="./assets/js/vendors/feather.min.js"></script>
      <!-- swiper js-->
      <script src="./assets/js/vendors/swiper-bundle.min.js"></script>
      <script src="./assets/js/vendors/swiper-custom.js"></script>
      <!-- smooth scroll js-->
      <script src="./assets/js/vendors/smooth-scroll.js"></script>
      <!-- sal js-->
      <script src="./assets/js/vendors/sal.js"></script>
      <!-- Custom script-->
      <script src="./assets/js/script.js"></script>
    <script>
      const inputElements = [...document.querySelectorAll('input.code-input')]
          inputElements.forEach((ele,index)=>{
            ele.addEventListener('keydown',(e)=>{              
              if(e.keyCode === 8 && e.target.value==='') inputElements[Math.max(0,index-1)].focus()
            })
            ele.addEventListener('input',(e)=>{             
              const [first,...rest] = e.target.value
              e.target.value = first ?? ''
              const lastInputBox = index===inputElements.length-1
              const insertedContent = first!==undefined
              if(insertedContent && !lastInputBox) {               
                inputElements[index+1].focus()
                inputElements[index+1].value = rest.join('')
                inputElements[index+1].dispatchEvent(new Event('input'))
              }
            })
          })
    </script>
  </body>
