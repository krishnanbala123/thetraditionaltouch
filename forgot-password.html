  <body class="authentication-wrap">
    <!-- forgot password start          -->
    <div class="auth-main">
      <div class="codex-authbox">
        <div class="auth-header">
        <div class="codex-brand"><a href="index.html"><img class="img-fluid light-logo" src="./assets/images/dress/logo_1.png" style="width: 85px;" alt=""><img class="img-fluid dark-logo" src="./assets/images/logo/fashion-light.png" alt=""></a></div>
          <h3>forgot password ?                 </h3>
          <p class="text-light">Enter Your Email And We&apos;ll Send You A Link To Reset <br> Your Password.</p>
        </div>
        <form>
          <div class="form-group mb-0">
            <label class="form-label">email</label>
            <input class="form-control" type="email" placeholder="Enter your email">
          </div>
          <div class="form-group mb-0">                  
            <button class="btn btn-primary" type="submit"><i class="fa fa-key"></i> Send Reset Link</button>
          </div>
        </form>
      </div>
    </div>
    <!-- forgot password end-->
      <!-- main jquery-->
      <script src="./assets/js/jquery-3.6.0.min.js"></script>
      <!-- feather js-->
      <script src="./assets/js/vendors/feather.min.js"></script>
      <!-- swiper js-->
      <script src="./assets/js/vendors/swiper-bundle.min.js"></script>
      <script src="./assets/js/vendors/swiper-custom.js"></script>
      <!-- smooth scroll js-->
      <script src="./assets/js/vendors/smooth-scroll.js"></script>
      <!-- sal js-->
      <script src="./assets/js/vendors/sal.js"></script>
      <!-- Custom script-->
      <script src="./assets/js/script.js"></script>
      <script src="./assets/js/config.js"></script>

      <script>
        document.querySelector('form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const btn   = e.target.querySelector('button');
          const email = e.target.querySelector('input[type="email"]').value.trim();

          btn.disabled    = true;
          btn.textContent = 'Sending...';

          const res = await fetch(`${CONFIG.BASE_URL}/forget-password`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ email }),
          });

          const data = await res.json();

          if (data.success) {
            sessionStorage.setItem('reset_email', email);
            window.location.href = './verify-pin.html';
          } else {
            alert(data.message || 'Something went wrong. Please try again.');
            btn.disabled    = false;
            btn.innerHTML   = '<i class="fa fa-key"></i> Send Reset Link';
          }
        });
      </script>
  </body>
</html>
