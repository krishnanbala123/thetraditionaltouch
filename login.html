  <body class="authentication-wrap">
    <!-- login page start      -->
    <div class="auth-main">
      <div class="codex-authbox">
        <div class="auth-header">
          <div class="codex-brand"><a href="index.html"><img class="img-fluid light-logo" src="./assets/images/dress/logo_1.png" style="width: 85px;" alt=""><img class="img-fluid dark-logo" src="./assets/images/logo/fashion-light.png" alt=""></a></div>
          <h3>welcome to The Traditional Touch</h3>
          <h6>don't have an account? <a class="text-primary" href="register.html">creat an account</a></h6>
        </div>
        <form action="#">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-control" type="text" required placeholder="Enter Your Email">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-group group-input">
              <input class="form-control showhide-password" type="password" placeholder="Enter Your Password" required=""><span class="input-group-text toggle-show fa fa-eye"></span>
            </div>
          </div>
          <div class="form-group mb-0">
            <div class="auth-remember">                    
              <div class="form-check custom-chek">
                <input class="form-check-input" type="checkbox" id="agree" value="" required="">
                <label class="form-check-label" for="agree">Remember me</label>
              </div><a class="text-primary f-pwd" href="forgot-password.html">Forgot your password?             </a>
            </div>
          </div>
          <div class="form-group">
            <button class="btn btn-primary" type="submit"><i class="fa fa-sign-in"></i> Login</button>
          </div>
        </form>
        <div class="auth-footer">
          <h5 class="auth-with">Or login in with     </h5>
          <ul class="login-list">
            <li><a class="bg-fb" href="javascript:void(0);"> <img class="img-fluid" src="./assets/images/auth/1.png" alt="facebook">facebook</a></li>
            <li><a class="bg-google" href="javascript:void(0);"> <img class="img-fluid" src="./assets/images/auth/2.png" alt="google">google</a></li>
          </ul>
        </div>
      </div>
    </div>
